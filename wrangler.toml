# CG Interiors — Cloudflare Pages configuration
# Docs: https://developers.cloudflare.com/pages/functions/wrangler-configuration/

name = "cg-interiors"
compatibility_date = "2024-11-01"
pages_build_output_dir = "."

# --- D1 database binding (available in functions as env.DB) ---
# Create it once:  wrangler d1 create cg-interiors-inquiries
# then paste the printed database_id below.
[[d1_databases]]
binding = "DB"
database_name = "cg-interiors-inquiries"
database_id = "6c06fc7b-06b8-44aa-b613-0b6c45d7e0fe"

# --- Non-secret config (safe to commit) ---
# The sending identity must be on a domain you've verified in Resend.
[vars]
FROM_EMAIL = "CG Interiors <contact@camposgoldberg.com>"
STUDIO_INBOX = "isadoraterci@gmail.com"

# --- Secrets: DO NOT put these here. Set them instead with:
#   wrangler pages secret put RESEND_API_KEY
#   wrangler pages secret put TURNSTILE_SECRET
# (or in the Cloudflare dashboard → Pages → Settings → Variables & Secrets)
